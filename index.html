<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | MADDAD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg">
    <div class="blur blur-top"></div>
    <div class="blur blur-bottom"></div>

    <main class="landing-page">
      <header class="hero">
        <img src="logo.png" alt="شعار مدد" class="hero-logo" />

        <h1 class="hero-title">مرحبًا بكم في مدد</h1>

        <p class="hero-subtitle">
          منصة رقمية لمتابعة نمو الطفل ودعم الكشف المبكر بطريقة منظمة وسهلة الاستخدام.
        </p>
      </header>

      <section class="user-type-section">
        <h2 class="section-title">اختر نوع المستخدم</h2>
        <p class="section-subtitle">
          حددي طريقة الدخول المناسبة للمتابعة أو للوصول إلى صفحة الألعاب.
        </p>

        <div class="user-cards">
          <button class="user-card parent-card" onclick="goParent()">
            <div class="card-badge"></div>
            <div class="card-content">
              <h3>ولي الأمر</h3>
              <p>الدخول إلى الحساب، الاستبيان، النتائج، والمتابعة</p>
            </div>
            <span class="card-arrow">←</span>
          </button>

          <button class="user-card child-card" onclick="goChild()">
            <div class="card-badge"></div>
            <div class="card-content">
              <h3>الطفل</h3>
              <p>الدخول المباشر إلى صفحة الألعاب المرتبطة بالحساب</p>
            </div>
            <span class="card-arrow">←</span>
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
